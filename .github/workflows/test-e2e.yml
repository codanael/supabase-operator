name: E2E Tests

on:
  pull_request:

jobs:
  test-e2e:
    name: Run on Ubuntu
    runs-on: ubuntu-latest
    env:
      KIND_CLUSTER: supabase-operator-test-e2e
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install the latest version of kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/latest/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Verify kind installation
        run: kind version

      - name: Create kind cluster and install prerequisites
        run: make kind-up

      - name: Verify kind cluster is running
        run: |
          kind get clusters
          kubectl cluster-info --context kind-${KIND_CLUSTER}
          kubectl get nodes

      - name: Build operator image and load into kind
        run: |
          make docker-build IMG=controller:latest
          kind load docker-image controller:latest --name ${KIND_CLUSTER}

      - name: Running Test e2e
        run: |
          go mod tidy
          make test-e2e

      - name: Teardown kind cluster
        if: always()
        run: make kind-down
