name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate install manifest
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          make build-installer IMG=ghcr.io/codanael/supabase-operator:${VERSION}
          mv dist/install.yaml install.yaml
          git checkout config/manager/kustomization.yaml

      - name: Run GoReleaser
        id: goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest checksums
        continue-on-error: true
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: ./dist/checksums.txt

      - name: Attest install manifest
        continue-on-error: true
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: ./install.yaml

      - name: Extract image digest
        id: digest
        run: |
          DIGEST=$(echo '${{ steps.goreleaser.outputs.artifacts }}' | jq -r '.[] | select(.type == "Docker Image") | .extra.Digest' | head -1)
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Attest container image
        continue-on-error: true
        if: steps.digest.outputs.digest != ''
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ghcr.io/codanael/supabase-operator
          subject-digest: ${{ steps.digest.outputs.digest }}
          push-to-registry: true
