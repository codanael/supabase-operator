name: OLM Bundle

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

concurrency:
  group: bundle-${{ github.ref }}
  cancel-in-progress: false

jobs:
  bundle:
    name: Build and Push Bundle & Catalog
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate bundle
        run: |
          make bundle IMG=ghcr.io/codanael/supabase-operator:${{ steps.version.outputs.version }} VERSION=${{ steps.version.outputs.version }}

      - name: Build and push bundle image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: bundle.Dockerfile
          push: true
          platforms: linux/amd64
          tags: ghcr.io/codanael/supabase-operator-bundle:v${{ steps.version.outputs.version }}

      - name: Build and push catalog image
        run: |
          make catalog-build \
            CATALOG_IMG=ghcr.io/codanael/supabase-operator-catalog:v${{ steps.version.outputs.version }} \
            BUNDLE_IMGS=ghcr.io/codanael/supabase-operator-bundle:v${{ steps.version.outputs.version }}
          make catalog-push \
            CATALOG_IMG=ghcr.io/codanael/supabase-operator-catalog:v${{ steps.version.outputs.version }}
