version: 2
project_name: supabase-operator

builds:
  - id: manager
    main: ./cmd/main.go
    binary: manager
    goos:
      - linux
    goarch:
      - amd64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s
      - -w

dockers_v2:
  - images:
      - "ghcr.io/codanael/supabase-operator"
    platforms:
      - linux/amd64
    tags:
      - "{{ .Version }}"
      - latest
    dockerfile: Dockerfile.goreleaser
    labels:
      "org.opencontainers.image.created": "{{.Date}}"
      "org.opencontainers.image.title": "{{.ProjectName}}"
      "org.opencontainers.image.revision": "{{.FullCommit}}"
      "org.opencontainers.image.version": "{{.Version}}"
      "org.opencontainers.image.source": "https://github.com/codanael/supabase-operator"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

release:
  extra_files:
    - glob: ./install.yaml
