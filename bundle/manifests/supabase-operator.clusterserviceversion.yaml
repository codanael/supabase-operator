  description: |
    ## Supabase Operator

    The **Supabase Operator** automates the deployment and lifecycle management
    of [Supabase](https://supabase.com) on Kubernetes and OpenShift clusters.

    ### Features

    - **Multi-Tenant Architecture**: Deploy a shared Supabase platform and
      provision isolated tenants, each with their own Auth, REST API, Realtime,
      Storage, and Edge Functions services.
    - **CloudNativePG Integration**: Manages PostgreSQL clusters using the
      CloudNativePG operator with automated backups and high availability.
    - **Kubernetes Gateway API**: Routes tenant traffic through the standard
      Gateway API, supporting any conformant implementation (Envoy Gateway,
      Istio, etc.).
    - **Tenant Isolation**: Each tenant runs in a dedicated Kubernetes namespace
      with separate secrets, services, and network policies.
    - **Suspend / Resume**: Scale tenant workloads to zero and back up with a
      single field toggle.
    - **Resource Presets**: Choose between small, medium, large, or custom
      resource sizing for tenant workloads.
    - **Image Overrides**: Customize container images for all Supabase
      components.

    ### Prerequisites

    The following operators must be installed on the cluster before deploying
    the Supabase Operator:

    1. **CloudNativePG Operator** — manages PostgreSQL clusters
    2. **A Gateway API implementation** — e.g., Envoy Gateway, Istio, or any
       conformant provider
    3. **Gateway API CRDs** — the Kubernetes Gateway API custom resource
       definitions

    ### Getting Started

    1. Install the prerequisites listed above.
    2. Install the Supabase Operator from OperatorHub.
    3. Create a `Supabase` resource to provision the shared platform.
    4. Create `SupabaseTenant` resources to provision isolated tenants.

    See the [documentation](https://github.com/codanael/supabase-operator) for
    detailed guides and examples.
