---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - supabase.codanael.io
  resources:
  - supabases
  - supabasetenants
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - supabase.codanael.io
  resources:
  - supabases/finalizers
  - supabasetenants/finalizers
  verbs:
  - update
- apiGroups:
  - supabase.codanael.io
  resources:
  - supabases/status
  - supabasetenants/status
  verbs:
  - get
  - patch
  - update
